worker_processes 1;
events { worker_connections 1024; }

http {
  resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name _;

    location = /booking-api/health {
      add_header Content-Type application/json;
      return 200 '{"ok":true,"service":"booking-api","timestamp":"$time_iso8601"}';
    }

    location = /booking-api/health/ {
      add_header Content-Type application/json;
      return 200 '{"ok":true,"service":"booking-api","timestamp":"$time_iso8601"}';
    }

    # Proxy /booking-api/* -> Supabase Edge Function booking-api
    location /booking-api/ {
      proxy_http_version 1.1;

      # Preserve client headers used for auth
      proxy_set_header Host              fwoescubnnagdvwasbjl.supabase.co;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_ssl_server_name on;
      proxy_ssl_name        fwoescubnnagdvwasbjl.supabase.co;

      # Rewrite prefix: /booking-api/foo -> /functions/v1/booking-api/foo
      proxy_pass https://fwoescubnnagdvwasbjl.supabase.co/functions/v1/booking-api/;
    }

    location = / {
      return 200 '{"status":"ok","service":"booking-api-proxy"}';
      add_header Content-Type application/json;
    }
  }
}
