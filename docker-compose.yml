services:
  server:
    build: ./server
    container_name: chatbot-server
    restart: always
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - EVO_BASE_URL=${EVO_BASE_URL}
      - EVO_GLOBAL_KEY=${EVO_GLOBAL_KEY}
      - PORT=3000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatbot-server.rule=Host(`${SERVER_DOMAIN}`)"
      - "traefik.http.routers.chatbot-server.entrypoints=websecure"
      - "traefik.http.routers.chatbot-server.tls=true"
      - "traefik.http.routers.chatbot-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.chatbot-server.loadbalancer.server.port=3000"
      - "traefik.docker.network=public"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_SUPABASE_PROJECT_ID=${VITE_SUPABASE_PROJECT_ID}
        - VITE_RUNTIME_URL=${VITE_RUNTIME_URL}
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: chatbot-frontend
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatbot-frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.chatbot-frontend.entrypoints=websecure"
      - "traefik.http.routers.chatbot-frontend.tls=true"
      - "traefik.http.routers.chatbot-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.chatbot-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=public"

networks:
  proxy:
    external: true
    name: public
